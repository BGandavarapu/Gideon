<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gideon{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">G</div>
      <span class="logo-text">Gideon</span>
    </div>

    <ul class="nav-list">
      <li>
        <a href="{{ url_for('dashboard') }}"
           class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M3 4a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 12a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1v-4zM11 4a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V4zM11 12a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/>
          </svg>
          Dashboard
        </a>
      </li>
      <li>
        <a href="{{ url_for('jobs_page') }}"
           class="nav-link {% if request.endpoint == 'jobs_page' %}active{% endif %}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M6 6V5a3 3 0 013-3h2a3 3 0 013 3v1h2a2 2 0 012 2v3.57A22.952 22.952 0 0110 13a22.95 22.95 0 01-8-1.43V8a2 2 0 012-2h2zm2-1a1 1 0 011-1h2a1 1 0 011 1v1H8V5zm1 5a1 1 0 011-1h.01a1 1 0 110 2H10a1 1 0 01-1-1z" clip-rule="evenodd"/>
            <path d="M2 13.692V16a2 2 0 002 2h12a2 2 0 002-2v-2.308A24.974 24.974 0 0110 15c-2.796 0-5.487-.46-8-1.308z"/>
          </svg>
          Jobs
          <span class="nav-badge" id="nav-badge-jobs"></span>
        </a>
      </li>
      <li>
        <a href="{{ url_for('resumes_page') }}"
           class="nav-link {% if request.endpoint == 'resumes_page' %}active{% endif %}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/>
          </svg>
          Resumes
        </a>
      </li>
      <li>
        <a href="{{ url_for('applications_page') }}"
           class="nav-link {% if request.endpoint == 'applications_page' %}active{% endif %}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
          </svg>
          Applications
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <a href="{{ url_for('settings_page') }}"
         class="nav-link sidebar-footer-item {% if request.endpoint == 'settings_page' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
        </svg>
        Settings
      </a>
    </div>
  </nav>

  <!-- ── Main content ──────────────────────────────────────────── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Side panel (job/resume detail) ───────────────────────── -->
  <aside id="side-panel" class="side-panel" aria-hidden="true">
    <div class="side-panel-header">
      <button class="panel-close" onclick="closePanel()" aria-label="Close panel">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
    <div id="side-panel-body" class="side-panel-body">
      <!-- dynamic content injected by JS -->
    </div>
  </aside>

  <!-- overlay -->
  <div id="panel-overlay" class="panel-overlay" onclick="closePanel()"></div>

  <!-- toast container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="{{ url_for('static', filename='js/main.js') }}?v=20260404d"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
