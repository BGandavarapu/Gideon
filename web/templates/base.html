<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gideon{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- ── Top nav ──────────────────────────────────────────────── -->
  <nav class="topnav">
    <div class="topnav-brand">
      <div class="logo-mark">G</div>
      <span class="logo-text">Gideon</span>
    </div>
    <ul class="topnav-links">
      <li><a href="/" class="topnav-link {% if request.endpoint == 'chat_page' %}active{% endif %}">Chat</a></li>
      <li><a href="/dashboard" class="topnav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a></li>
      <li><a href="/jobs" class="topnav-link {% if request.endpoint == 'jobs_page' %}active{% endif %}">Jobs<span class="nav-badge" id="nav-badge-jobs"></span></a></li>
      <li><a href="/resumes" class="topnav-link {% if request.endpoint == 'resumes_page' %}active{% endif %}">Resumes</a></li>
      <li><a href="/applications" class="topnav-link {% if request.endpoint == 'applications_page' %}active{% endif %}">Applications</a></li>
      <li><a href="/settings" class="topnav-link {% if request.endpoint == 'settings_page' %}active{% endif %}">Settings</a></li>
    </ul>
  </nav>

  <!-- ── Main content ──────────────────────────────────────────── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Side panel (job/resume detail) ───────────────────────── -->
  <aside id="side-panel" class="side-panel" aria-hidden="true">
    <div class="side-panel-header">
      <button class="panel-close" onclick="closePanel()" aria-label="Close panel">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
    <div id="side-panel-body" class="side-panel-body">
      <!-- dynamic content injected by JS -->
    </div>
  </aside>

  <!-- overlay -->
  <div id="panel-overlay" class="panel-overlay" onclick="closePanel()"></div>

  <!-- toast container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="{{ url_for('static', filename='js/main.js') }}?v=20260416a"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
